name: Reconcile Asaas Payments

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Reconcile pending payments
        run: |
          curl -s \
            "https://lrkmfhqetfwtdrfuginx.supabase.co/functions/v1/reconcile-payments" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
